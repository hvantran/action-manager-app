# Import external configuration
spring:
  config:
    import: 
      - classpath:kafka.properties
  application:
    name: ${action.manager.service.name}
  profiles:
    active: ${spring.profiles.active}
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  # OAuth2 Resource Server configuration for JWT validation
  security:
    oauth2:
      resourceserver:
        jwt:
          # Only use jwk-set-uri without issuer validation to support both localhost and Docker internal addresses
          # For dev: http://localhost:6080/realms/pman-realm/protocol/openid-connect/certs
          # For prod (Docker): http://keycloak:8080/realms/pman-realm/protocol/openid-connect/certs
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:6080/realms/pman-realm/protocol/openid-connect/certs}

# Server configuration
server:
  servlet:
    context-path: /${action.manager.service.name}
  error:
    include-message: always
    include-binding-errors: always

# SpringDoc configuration
springdoc:
  swagger-ui:
    enabled: ${springdoc.swagger-ui.enabled}
    path: /swagger-ui.html
  api-docs:
    enabled: ${springdoc.api-docs.enabled}
  packages-to-scan: com.hoatv.action.manager

# Management configuration
management:
  metrics:
    tags:
      application: action-manager
  endpoints:
    web:
      exposure:
        include:
          - health
          - loggers
          - info
          - prometheus
