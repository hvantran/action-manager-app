name: PR Build Check

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs when a new workflow with the same group name is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Checkout parent-pom
        uses: actions/checkout@v4
        with:
          repository: hvantran/parent-pom
          path: parent-pom
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Checkout base-platform
        uses: actions/checkout@v4
        with:
          repository: hvantran/base-platform
          path: base-platform
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Build parent-pom
        run: mvn clean install -f parent-pom/pom.xml -DskipTests
      
      - name: Build base-platform
        run: mvn clean install -f base-platform/pom.xml -DskipTests -Ddockerfile.skip=true
      
      - name: Build backend
        run: mvn clean verify -f action-manager-backend/pom.xml -B -Ddockerfile.skip=true
      
      - name: Run backend tests
        run: mvn test -f action-manager-backend/pom.xml -B
  
  build-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: action-manager-ui/yarn.lock
      
      - name: Install dependencies
        working-directory: action-manager-ui
        run: yarn install --frozen-lockfile
      
      - name: Setup environment
        working-directory: action-manager-ui
        run: |
          chmod +x ./env.sh
          ./env.sh || echo "REACT_APP_API_URL=http://localhost:8080" > .env
          if [ -f env-config.js ]; then mv env-config.js ./public/; fi
      
      - name: Build UI
        working-directory: action-manager-ui
        run: yarn build
        env:
          CI: false
      
      - name: Run UI tests
        working-directory: action-manager-ui
        run: yarn test --passWithNoTests --watchAll=false
