name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Checkout parent-pom
        uses: actions/checkout@v4
        with:
          repository: hvantran/parent-pom
          path: parent-pom
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Checkout base-platform
        uses: actions/checkout@v4
        with:
          repository: hvantran/base-platform
          path: base-platform
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Build parent-pom
        run: mvn clean install -f parent-pom/pom.xml -DskipTests
      
      - name: Build base-platform
        run: mvn clean install -f base-platform/pom.xml -DskipTests -Ddockerfile.skip=true
      
      - name: Build backend
        run: mvn clean verify -f action-manager-backend/pom.xml -B -Ddockerfile.skip=true
      
      - name: Run backend tests
        run: mvn test -f action-manager-backend/pom.xml -B
  
  build-ui:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: action-manager-ui/yarn.lock
      
      - name: Install dependencies
        working-directory: action-manager-ui
        run: yarn install --frozen-lockfile
      
      - name: Build UI
        working-directory: action-manager-ui
        run: yarn build
      
      - name: Run UI tests
        working-directory: action-manager-ui
        run: yarn test --passWithNoTests
